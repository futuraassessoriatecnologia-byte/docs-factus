site_name: Factus ERP — Documentação
site_description: Documentação técnica e funcional do sistema Factus ERP
site_author: Equipe Factus
site_url: https://futuraassessoriatecnologia-byte.github.io/docs-factus
repo_url: https://github.com/futuraassessoriatecnologia-byte/docs-factus
repo_name: futuraassessoriatecnologia-byte/docs-factus

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Início: index.md
  - Nottas Fiscais:
      - Nota Fiscal: nfe/index.md
      - Nota Fiscal de Serviço: nfse/index.md
  - Financeiro:
      - Visão Geral: financeiro/index.md
      - Conciliação Bancária:
          - Regras de Conciliação: financeiro/conciliacao-bancaria/regras-conciliacao.md
      - Agrupamento de Duplicatas: financeiro/agrupamento-duplicatas.md
  - NF-e:
      - Nota Fiscal de Estorno: nfe/nota-fiscal-estorno.md
      - Nota Fiscal de Complemento ou Ajuste: nfe/nota-fiscal-complemento-ajuste.md
      - Nota Fiscal de Exportação: nfe/nota-fiscal-exportacao.md
      - Nota Fiscal de Devolução: nfe/nota-fiscal-devolucao.md
      - Nota Fiscal de Devolução (Fornecedor): nfe/nota-fiscal-devolucao-fornecedor.md
  - NFS-e:
      - Ajustes NFS-e: nfse/ajustes-nfse.md
  - Compras:
      - Visão Geral: compras/index.md
      - Ordem de Compra: compras/ordem-de-compra.md
  - App Facção:
      - Emissão de Notas de Cobrança: app-faccao/emissao-notas-cobranca-industrializacao.md
      - Emissão de Notas de Retorno: app-faccao/emissao-notas-retorno-industrializacao.md
      - Mesclar Notas Fiscais: app-faccao/mesclar-notas-fiscais.md
      - Produtividade por Quantidade: app-faccao/produtividade-por-quantidade.md
  - Ponto:
      - Funcionamento do Ponto: ponto/funcionamento-ponto.md
  - Configurações:
      - Configurar Aplicativo no Celular: configuracoes/configurar-aplicativo-celular.md
      - Envio de E-mail NF-e: configuracoes/envio-email-nfe.md
      - Certificado Digital: configuracoes/certificado-digital.md
      - Parâmetro Pedidos de Saída: configuracoes/parametro-pedidos-saida.md
  - Estoque: estoque/index.md
  - Fiscal: fiscal/index.md
  - Produção: producao/index.md
  - API: api/index.md
#   - Suporte: suporte/index.md
